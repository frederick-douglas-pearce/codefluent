version: 2
updates:
  # VS Code extension (npm)
  - package-ecosystem: "npm"
    directory: "/vscode-extension"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      npm-patch-minor:
        update-types:
          - "minor"
          - "patch"
      npm-major:
        update-types:
          - "major"

  # Web app (pip/uv)
  - package-ecosystem: "pip"
    directory: "/webapp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      pip-patch-minor:
        update-types:
          - "minor"
          - "patch"
      pip-major:
        update-types:
          - "major"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      actions-patch-minor:
        update-types:
          - "minor"
          - "patch"
      actions-major:
        update-types:
          - "major"
