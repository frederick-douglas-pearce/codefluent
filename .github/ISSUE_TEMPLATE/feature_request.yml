name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: interface
    attributes:
      label: Interface
      description: Which interface does this apply to?
      options:
        - VS Code extension
        - Web app (FastAPI)
        - Both
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: A clear description of the feature or improvement.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why?
      description: What problem does this solve or what workflow does it improve?
    validations:
      required: true
