name: Bug Report
description: Report a bug in CodeFluent
labels: ["bug"]
body:
  - type: dropdown
    id: interface
    attributes:
      label: Interface
      description: Which CodeFluent interface are you using?
      options:
        - VS Code extension
        - Web app (FastAPI)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      placeholder: "e.g., Ubuntu 24.04, macOS 15.2, Windows 11 23H2"

  - type: input
    id: vscode-version
    attributes:
      label: VS Code Version
      placeholder: "e.g., 1.96.0 (skip if using web app)"

  - type: input
    id: extension-version
    attributes:
      label: CodeFluent Extension Version
      placeholder: "e.g., 0.1.0 (skip if using web app)"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open the CodeFluent sidebar
        2. Click "Score Sessions"
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: "Paste any error messages, console output, or screenshots. For VS Code, check Output > CodeFluent."
      render: text
